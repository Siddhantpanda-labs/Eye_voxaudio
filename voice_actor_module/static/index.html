<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxStudio — AI Voice Acting Engine</title>
    <meta name="description"
        content="Professional AI Voice Acting Studio with intent-aware synthesis, voice direction, and real-time audio preview.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
    <!-- Animated background -->
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <div class="app-shell">
        <!-- Top Bar -->
        <nav class="top-bar">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#818cf8" />
                            <stop offset="100%" style="stop-color:#f472b6" />
                        </linearGradient>
                    </defs>
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                    <line x1="12" y1="19" x2="12" y2="23" />
                    <line x1="8" y1="23" x2="16" y2="23" />
                </svg>
                <h1>Vox<span>Studio</span></h1>
            </div>
            <div class="status-bar">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Ready</span>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="main-layout">
            <!-- Left Panel: Controls -->
            <section class="panel panel-controls">
                <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>Director's Console</h2>
                    <div class="mode-switcher" style="display: flex; gap: 4px; background: var(--bg-input); padding: 4px; border-radius: var(--radius-sm); border: 1px solid var(--border-default);">
                        <button id="mode-script-btn" style="padding: 4px 12px; border: none; border-radius: var(--radius-sm); cursor: pointer; background: var(--bg-elevated); color: var(--text-primary); font-size: 0.8rem;">Script</button>
                        <button id="mode-conv-btn" style="padding: 4px 12px; border: none; border-radius: var(--radius-sm); cursor: pointer; background: transparent; color: var(--text-muted); font-size: 0.8rem;">Conversation</button>
                    </div>
                </div>

                <div id="script-mode-container">

                <div class="form-group">
                    <label for="script">Script</label>
                    <textarea id="script" rows="5"
                        placeholder="Type your dialogue... Use expression tags like (laughs) or click the buttons below."></textarea>
                    <div class="char-count"><span id="char-count">0</span> chars</div>
                </div>

                <!-- Expression Tag Palette -->
                <div class="expression-palette">
                    <label>Expressions</label>
                    <div class="tag-buttons">
                        <button class="tag-btn" data-tag="[laughter]">😂 Laughter</button>
                        <button class="tag-btn" data-tag="[giggle]">😄 Giggle</button>
                        <button class="tag-btn" data-tag="[guffaw]">🤣 Guffaw</button>
                        <button class="tag-btn" data-tag="[sigh]">😮‍💨 Sigh</button>
                        <button class="tag-btn" data-tag="[gasp]">😲 Gasp</button>
                        <button class="tag-btn" data-tag="[groan]">😩 Groan</button>
                        <button class="tag-btn" data-tag="[cough]">😷 Cough</button>
                        <button class="tag-btn" data-tag="[cry]">😢 Cry</button>
                        <button class="tag-btn" data-tag="[sniff]">🌬️ Sniff</button>
                        <button class="tag-btn" data-tag="[sneeze]">🤧 Sneeze</button>
                        <button class="tag-btn" data-tag="[inhale]">💨 Inhale</button>
                        <button class="tag-btn" data-tag="[exhale]">🌫️ Exhale</button>
                        <button class="tag-btn" data-tag="[clear_throat]">🗣️ Clear Throat</button>
                        <button class="tag-btn" data-tag="[whisper]">🤫 Whisper</button>
                        <button class="tag-btn" data-tag="[mumble]">😶 Mumble</button>
                        <button class="tag-btn" data-tag="[humming]">🎵 Hum</button>
                        <button class="tag-btn" data-tag="[uh]">🤔 Uh</button>
                        <button class="tag-btn" data-tag="[um]">💭 Um</button>
                        <button class="tag-btn" data-tag="[shhh]">🤐 Shhh</button>
                        <button class="tag-btn" data-tag="(angrily) ">😡 Angry</button>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="engine">TTS Engine</label>
                        <select id="engine">
                            <option value="elevenlabs">ElevenLabs (Cloud)</option>
                            <option value="chatterbox">Chatterbox Turbo (Local)</option>
                        </select>
                    </div>
                    <div class="form-group" id="cb-voice-group" style="display:none;">
                        <label for="cb-voice">Clone Target (Voice)</label>
                        <select id="cb-voice" style="margin-bottom: 8px;">
                            <option value="">-- Upload New Reference --</option>
                            <!-- Saved voices will be injected here -->
                        </select>
                        <div id="cb-upload-section">
                            <input type="file" id="ref-audio" accept="audio/*,video/mp4"
                                style="font-size:0.8rem; padding:8px; background:var(--bg-input); border-radius:var(--radius-sm); border:1px solid var(--border-default); color:var(--text-primary); width:100%; margin-bottom: 8px;">
                            <div style="display: flex; gap: 8px;">
                                <input type="text" id="cb-new-voice-name" placeholder="Voice Name" style="font-size:0.8rem; padding:8px; background:var(--bg-input); border-radius:var(--radius-sm); border:1px solid var(--border-default); color:var(--text-primary); flex-grow: 1;">
                                <button type="button" id="cb-save-voice-btn" style="padding: 8px 12px; background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border-default); border-radius: var(--radius-sm); cursor: pointer; font-size: 0.8rem;">Save</button>
                            </div>
                        </div>
                        <div id="cb-delete-section" style="display: none; margin-top: 8px;">
                            <button type="button" id="cb-delete-voice-btn" style="padding: 8px 12px; background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.5); border-radius: var(--radius-sm); cursor: pointer; font-size: 0.8rem; width: 100%;">Delete Saved Voice</button>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="target-language">Language</label>
                        <select id="target-language">
                            <option value="english">English</option>
                            <option value="hindi">Hindi</option>
                            <option value="french">French</option>
                            <option value="german">German</option>
                            <option value="spanish">Spanish</option>
                            <option value="japanese">Japanese</option>
                            <option value="chinese">Chinese</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group" id="voice-group">
                        <label for="voice">Voice</label>
                        <select id="voice">
                            <option value="">Loading voices...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="tone">Tone / Feel</label>
                        <select id="tone">
                            <option value="auto">🎯 Auto (LLM Detect)</option>
                            <option value="angry">😡 Angry</option>
                            <option value="sad">😢 Sad</option>
                            <option value="happy">😄 Happy</option>
                            <option value="sarcastic">😏 Sarcastic</option>
                            <option value="whisper">🤫 Whisper</option>
                            <option value="dramatic">🎭 Dramatic</option>
                            <option value="threatening">💀 Threatening</option>
                            <option value="romantic">💕 Romantic</option>
                        </select>
                    </div>
                </div>
                <div class="director-sliders">
                    <div class="slider-group">
                        <div class="slider-header">
                            <label for="hesitation">Hesitation / Stutters</label>
                            <span id="hesitation-val">0%</span>
                        </div>
                        <input type="range" id="hesitation" min="0" max="100" value="0">
                    </div>
                    <div class="slider-group">
                        <div class="slider-header">
                            <label for="breathiness">Breathiness / Sighs</label>
                            <span id="breathiness-val">0%</span>
                        </div>
                        <input type="range" id="breathiness" min="0" max="100" value="0">
                    </div>
                </div>

                <!-- ElevenLabs Voice Tuning -->
                <div id="el-controls" class="director-sliders">
                    <div class="slider-group">
                        <div class="slider-header">
                            <label for="el-stability">Stability (Low = Expressive)</label>
                            <span id="el-stability-val">0.50</span>
                        </div>
                        <input type="range" id="el-stability" min="0" max="100" value="50">
                    </div>
                    <div class="slider-group">
                        <div class="slider-header">
                            <label for="el-similarity">Similarity Boost</label>
                            <span id="el-similarity-val">0.75</span>
                        </div>
                        <input type="range" id="el-similarity" min="0" max="100" value="75">
                    </div>
                    <div class="slider-group">
                        <div class="slider-header">
                            <label for="el-style">Style Exaggeration</label>
                            <span id="el-style-val">0.00</span>
                        </div>
                        <input type="range" id="el-style" min="0" max="100" value="0">
                    </div>

                    <div class="form-row" style="margin-top: 4px;">
                        <label class="toggle-label">
                            <input type="checkbox" id="el-boost" checked>
                            <span class="toggle-switch"></span>
                            Speaker Boost (Clarity)
                        </label>
                    </div>
                </div>

                <!-- Chatterbox Advanced Controls -->
                <div id="cb-controls" class="director-sliders" style="display:none;">
                    <div class="slider-group">
                        <div class="slider-header">
                            <label for="cb-exaggeration">🎭 Emotion Intensity</label>
                            <span id="cb-exaggeration-val">0.50</span>
                        </div>
                        <input type="range" id="cb-exaggeration" min="0" max="100" value="50">
                    </div>
                    <div class="slider-group">
                        <div class="slider-header">
                            <label for="cb-cfg-weight">🎤 Clone Fidelity</label>
                            <span id="cb-cfg-weight-val">0.50</span>
                        </div>
                        <input type="range" id="cb-cfg-weight" min="0" max="100" value="50">
                    </div>
                    <div class="slider-group">
                        <div class="slider-header">
                            <label for="cb-temperature">🌡️ Spontaneity</label>
                            <span id="cb-temperature-val">0.80</span>
                        </div>
                        <input type="range" id="cb-temperature" min="10" max="150" value="80">
                    </div>
                    <div class="slider-group">
                        <div class="slider-header">
                            <label for="cb-rep-penalty">🛡️ Loop Guard</label>
                            <span id="cb-rep-penalty-val">1.50</span>
                        </div>
                        <input type="range" id="cb-rep-penalty" min="100" max="200" value="150">
                    </div>
                </div>

                <div class="form-row" style="margin-top: 8px; margin-bottom: 6px;">
                    <label class="toggle-label">
                        <input type="checkbox" id="apply-fx">
                        <span class="toggle-switch"></span>
                        Studio FX (EQ + Compression + Gate)
                    </label>
                </div>
                </div> <!-- End script-mode-container -->

                <div id="conv-mode-container" style="display: none;">
                    <div id="conv-lines-container"></div>
                    <button id="add-conv-line-btn" style="width: 100%; padding: 12px; background: var(--bg-input); color: var(--text-primary); border: 1px dashed var(--border-default); border-radius: var(--radius-md); cursor: pointer; margin-bottom: 12px; transition: background 0.2s;">
                        + Add Conversation Line
                    </button>
                </div>

                <template id="conv-line-template">
                    <div class="conv-line" style="background: var(--bg-elevated); padding: 12px; border-radius: var(--radius-md); margin-bottom: 12px; border: 1px solid var(--border-default); display: flex; flex-direction: column; gap: 12px; position: relative;">
                        <button class="remove-line-btn" style="position: absolute; top: 12px; right: 12px; background: transparent; border: none; color: #ef4444; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; transition: transform var(--transition); z-index: 2;" title="Delete Line" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                        <div class="form-row" style="margin-bottom: 0; padding-right: 32px; display: flex; gap: 12px;">
                            <div class="form-group" style="flex: 1; margin-bottom: 0;">
                                <select class="conv-engine" style="padding: 10px 12px; font-size: 0.8rem; background-position: right 8px center;">
                                    <option value="elevenlabs">ElevenLabs</option>
                                    <option value="chatterbox">Chatterbox</option>
                                </select>
                            </div>
                            <div class="form-group" style="flex: 1.5; margin-bottom: 0;">
                                <select class="conv-voice" style="padding: 10px 12px; font-size: 0.8rem; background-position: right 8px center;">
                                    <option value="">Loading...</option>
                                </select>
                            </div>
                            <div class="form-group" style="flex: 1; margin-bottom: 0;">
                                <select class="conv-language" style="padding: 10px 12px; font-size: 0.8rem; background-position: right 8px center;">
                                    <option value="english">English</option>
                                    <option value="hindi">Hindi</option>
                                    <option value="french">French</option>
                                    <option value="japanese">Japanese</option>
                                    <option value="spanish">Spanish</option>
                                    <option value="german">German</option>
                                    <option value="chinese">Chinese</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group" style="width: 100%; margin-bottom: 0;">
                            <textarea class="conv-text" rows="2" placeholder="Type dialogue..." style="width: 100%; resize: vertical; padding: 10px 12px; font-size: 0.85rem; line-height: 1.4;"></textarea>
                        </div>
                    </div>
                </template>

                <button id="generate-btn" class="btn-generate">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="5 3 19 12 5 21 5 3" />
                    </svg>
                    Generate Take
                </button>

            </section>

            <!-- Right Panel: Output & History -->
            <section class="panel panel-output">
                <div class="panel-header">
                    <h2>Performance Monitor</h2>
                </div>

                <!-- Current Output -->
                <div id="current-output" class="output-card hidden">
                    <div class="intent-badges" id="intent-badges"></div>
                    <div class="refined-script" id="refined-script"></div>
                </div>

                <!-- Blob Visualizer (always visible) -->
                <div class="blob-area">
                    <canvas id="blob-canvas"></canvas>
                    <audio id="audio-player" style="display:none;"></audio>
                </div>

                <div class="playback-controls">
                    <button id="play-btn" class="btn-play" title="Play / Pause">
                        <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 3 19 12 5 21 5 3" />
                        </svg>
                        <svg id="pause-icon" class="hidden" width="20" height="20" viewBox="0 0 24 24"
                            fill="currentColor">
                            <rect x="6" y="4" width="4" height="16" />
                            <rect x="14" y="4" width="4" height="16" />
                        </svg>
                    </button>
                    <span id="time-display" class="time-display">0:00 / 0:00</span>
                    <button id="download-btn" class="btn-download" title="Download WAV">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                    </button>
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        opacity="0.3">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                    </svg>
                    <p>No takes yet. Write a script and generate your first performance.</p>
                </div>

                <!-- History -->
                <div class="history-section">
                    <h3>Session History</h3>
                    <div id="history-list" class="history-list">
                        <!-- Injected by JS -->
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
